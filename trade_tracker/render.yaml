services:
  - type: web
    name: tradetracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: TRADETRACKER_SECRET_KEY
        generateValue: true
      - key: TRADETRACKER_DEBUG
        value: "0"
      - key: TRADETRACKER_SEED_DEMO
        value: "0"
      - key: TRADETRACKER_SECURE_COOKIE
        value: "1"
      - key: TRADETRACKER_APP_NAME
        value: TradeTracker
      - key: TRADETRACKER_DB_PATH
        value: /var/data/database.db
    disks:
      - name: tradetracker-data
        mountPath: /var/data
        sizeGB: 1
